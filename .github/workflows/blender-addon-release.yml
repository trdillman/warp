name: Blender Addon Release

on:
  workflow_dispatch:
  push:
    tags:
      - "addon-v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"


jobs:
  build-addon-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.3"

      - name: Set up Python
        run: uv python install

      - name: Resolve addon version
        id: version
        run: |
          ADDON_VERSION="$(uv run scripts/build_blender_addon_zip.py --print-version)"
          echo "addon_version=${ADDON_VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip_name=cinematic_astro_sim_blender_addon-v${ADDON_VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/addon-v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#addon-v}"
          if [ "${TAG_VERSION}" != "${{ steps.version.outputs.addon_version }}" ]; then
            echo "Tag version (${TAG_VERSION}) does not match addon bl_info version (${{ steps.version.outputs.addon_version }})."
            exit 1
          fi

      - name: Build addon artifact
        run: uv run scripts/build_blender_addon_zip.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: blender-addon-release
          path: |
            dist/${{ steps.version.outputs.zip_name }}
            dist/${{ steps.version.outputs.zip_name }}.sha256

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/addon-v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/${{ steps.version.outputs.zip_name }}" \
            "dist/${{ steps.version.outputs.zip_name }}.sha256" \
            --verify-tag \
            --title "Blender Addon ${GITHUB_REF_NAME}" \
            --notes "Standalone Blender addon release artifact."
