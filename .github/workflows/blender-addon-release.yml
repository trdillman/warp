name: Blender Addon Release

on:
  workflow_dispatch:
  push:
    tags:
      - "addon-v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-addon-release:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.3"

      - name: Set up Python
        run: uv python install

      - name: Resolve addon version
        id: version
        shell: pwsh
        run: |
          $addonVersion = uv run scripts/build_blender_addon_zip.py --print-version
          "addon_version=$addonVersion" >> $env:GITHUB_OUTPUT
          "zip_name=cinematic_astro_sim_blender_addon-v$addonVersion-windows.zip" >> $env:GITHUB_OUTPUT

      - name: Resolve pinned runtime wheel
        id: runtime
        shell: pwsh
        run: |
          $wheelPath = uv run scripts/build_blender_addon_zip.py --print-runtime-wheel
          "wheel_path=$wheelPath" >> $env:GITHUB_OUTPUT

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/addon-v')
        shell: pwsh
        run: |
          $tagVersion = $env:GITHUB_REF_NAME.Substring(6)
          if ($tagVersion -ne "${{ steps.version.outputs.addon_version }}") {
            throw "Tag version ($tagVersion) does not match addon version (${{ steps.version.outputs.addon_version }})."
          }

      - name: Build addon artifact
        run: uv run scripts/build_blender_addon_zip.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: blender-addon-release
          path: |
            dist/${{ steps.version.outputs.zip_name }}
            dist/${{ steps.version.outputs.zip_name }}.sha256

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/addon-v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create "${env:GITHUB_REF_NAME}" `
            "dist/${{ steps.version.outputs.zip_name }}" `
            "dist/${{ steps.version.outputs.zip_name }}.sha256" `
            --verify-tag `
            --title "Blender Addon ${env:GITHUB_REF_NAME}" `
            --notes "Windows Blender addon release artifact with bundled Warp runtime."
